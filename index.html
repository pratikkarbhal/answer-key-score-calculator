<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negative Marking Calculator</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #222;
    --primary: #2563eb;
    --danger: #dc2626;
    --border: #e5e7eb;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    background: var(--card);
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 380px;
    text-align: center;
}

h2 {
    color: var(--text);
    margin-bottom: 20px;
}

select,
input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    margin-bottom: 15px;
}

input {
    font-size: 32px;
    font-weight: bold;
    color: var(--primary);
    background: #fafafa;
}

.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease;
}

button:active {
    transform: scale(0.97);
}

.correct {
    background: var(--primary);
    color: white;
}

.wrong {
    background: var(--danger);
    color: white;
}

.info {
    margin-top: 15px;
    color: #666;
    font-size: 14px;
}

@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    .card {
        max-width: 100%;
        padding: 25px;
    }

    h2 {
        font-size: 2rem;
    }

    select {
        font-size: 22px;
        padding: 16px;
    }

    input {
        font-size: 56px;
        padding: 20px;
    }

    button {
        font-size: 24px;
        padding: 20px;
    }

    .info {
        font-size: 16px;
    }

}
</style>
</head>

<body>

<div class="card">
    <h2>Negative Marking Calculator</h2>

    <select id="negativeMark">
        <option value="0.25">0.25 Negative</option>
        <option value="0.33">0.33 Negative</option>
        <option value="0.5">0.50 Negative</option>
    </select>

    <input type="number" id="counter" value="0.00" readonly>

    <div class="buttons">
        <button class="correct" onclick="addCorrect()">
            +1 Correct
        </button>

        <button class="wrong" onclick="addWrong()">
            Wrong
        </button>
    </div>

    <div class="info">
        Note: Do not consider Un-attempted questions as it won't have any effect.<br>
        Correct = +1 | Wrong = -Selected (default -0.25 , can be changed from drop-down)
    </div>
</div>

<script>
let total = 0;

function updateDisplay() {
    document.getElementById("counter").value = total.toFixed(2);
}

function addCorrect() {
    total += 1;
    updateDisplay();
}

function addWrong() {
    const negative = parseFloat(
        document.getElementById("negativeMark").value
    );

    total -= negative;
    updateDisplay();
}
</script>

</body>
</html>
