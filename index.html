<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negative Marking Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap');

  :root {
    --bg:      #f0ede8;
    --surface: #e6e2db;
    --border:  #d4cfc8;
    --text:    #1e1c1a;
    --muted:   #8a8278;
    --icon:    #2c2a28;

    --correct: #5c9e74;
    --wrong:   #b55c5c;
    --skip:    #9e8f52;

    --pos:     #2e6b45;
    --neg:     #8f3a3a;
    --zero:    #6b6560;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    color: var(--text);
  }

  /* ── Layout — no card, just a width-constrained column ── */
  .layout {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Top bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .history-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Undo / Redo — icon + small label stacked */
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    color: var(--icon);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .icon-btn:hover  { background: var(--border); }
  .icon-btn:active { transform: scale(0.93); }
  .icon-btn:disabled {
    color: #c0bbb4;
    border-color: #e0dcd6;
    cursor: default;
    background: var(--surface) !important;
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* Reset — pill with text, always visible */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    color: var(--icon);
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .reset-btn:hover  { background: var(--surface); }
  .reset-btn:active { transform: scale(0.95); }
  .reset-btn svg    { width: 14px; height: 14px; flex-shrink: 0; }
  .reset-btn.confirm-reset {
    color: var(--wrong);
    border-color: var(--wrong);
    background: #fdf0f0;
  }

  /* ── Neg mark ── */
  .neg-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .neg-label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
  }

  select {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    appearance: none;
    text-align: center;
  }
  select:focus { outline: 2px solid var(--correct); outline-offset: 2px; }

  /* ── Score block ── */
  .score-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px 16px;
    text-align: center;
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .score-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 58px;
    font-weight: 700;
    line-height: 1;
    color: var(--zero);
    transition: color 0.3s;
  }
  .score-value.pos { color: var(--pos); }
  .score-value.neg { color: var(--neg); }

  .q-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 10px;
  }
  .q-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .q-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    background: var(--border);
    color: var(--text);
    padding: 2px 10px;
    border-radius: 20px;
  }

  /* ── Action buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-correct,
  .btn-wrong {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 16px 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: filter 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.01em;
  }
  .btn-correct { background: var(--correct); color: #e8f5ee; }
  .btn-wrong   { background: var(--wrong);   color: #f5e8e8; }
  .btn-correct:hover { filter: brightness(1.1); }
  .btn-wrong:hover   { filter: brightness(1.1); }
  .btn-correct:active, .btn-wrong:active { transform: scale(0.96); }

  .btn-skip {
    width: 66px;
    height: 66px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--skip);
    background: transparent;
    color: #6b5e2a;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
  }
  .btn-skip:hover  { background: rgba(122,110,58,0.08); }
  .btn-skip:active { transform: scale(0.93); }
  .skip-icon { font-size: 17px; line-height: 1; }

  /* ── Stats grid ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }

  .stat-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-val.c { color: var(--correct); }
  .stat-val.s { color: var(--skip); }
  .stat-val.w { color: var(--wrong); }
  .stat-val.a { color: var(--pos); }

  .stat-lbl {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Accuracy bar ── */
  .accuracy-wrap { }

  .accuracy-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }

  .accuracy-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .accuracy-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--pos);
  }

  .accuracy-track {
    height: 5px;
    background: var(--surface);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .accuracy-fill {
    height: 100%;
    background: var(--correct);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Note ── */
  .note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .kbd {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--text);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Ripple ── */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-anim 0.42s linear;
    background-color: rgba(255,255,255,0.22);
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(5); opacity: 0; }
  }

  @media (max-width: 480px) {
    body { padding: 20px 16px; }
    .score-value { font-size: 62px; }
    .btn-correct, .btn-wrong { padding: 18px 8px; }
    .btn-skip { width: 70px; height: 70px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="app-title">Score Tracker</span>
    <div class="history-controls">
      <button class="icon-btn" id="btnUndo" onclick="undo()" title="Undo" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9h13a5 5 0 0 1 0 10H7"/>
          <polyline points="3 5 3 9 7 9"/>
        </svg>
        Undo
      </button>
      <button class="icon-btn" id="btnRedo" onclick="redo()" title="Redo" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 9H8a5 5 0 0 0 0 10h9"/>
          <polyline points="21 5 21 9 17 9"/>
        </svg>
        Redo
      </button>
      <button class="reset-btn" id="btnReset" onclick="resetAll()" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Start Again
      </button>
    </div>
  </div>

  <!-- Neg mark -->
  <div class="neg-row">
    <span class="neg-label">Negative mark</span>
    <select id="negativeMark">
      <option value="0.25">− 0.25</option>
      <option value="0.33">− 0.33</option>
      <option value="0.5">− 0.50</option>
    </select>
  </div>

  <!-- Score -->
  <div class="score-wrap">
    <div class="score-label">Total Score</div>
    <div class="score-value" id="scoreDisplay">0.00</div>
    <div class="q-row">
      <span class="q-label">Current Question</span>
      <span class="q-badge" id="qBadge">1</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="action-row">
    <button class="btn-correct" onclick="addCorrect(event)">✓ Correct</button>
    <button class="btn-skip" onclick="addSkip(event)" title="Skip">
      <span class="skip-icon">⊘</span>
      <span>Skip</span>
    </button>
    <button class="btn-wrong" onclick="addWrong(event)">✗ Wrong</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-val c" id="statCorrect">0</div>
      <div class="stat-lbl">Correct</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val s" id="statSkipped">0</div>
      <div class="stat-lbl">Skipped</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val w" id="statWrong">0</div>
      <div class="stat-lbl">Wrong</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val a" id="statAccuracy">—</div>
      <div class="stat-lbl">Accuracy</div>
    </div>
  </div>

  <!-- Accuracy bar -->
  <div class="accuracy-wrap">
    <div class="accuracy-row">
      <span class="accuracy-label">Live Accuracy</span>
      <span class="accuracy-pct" id="accuracyPct">—</span>
    </div>
    <div class="accuracy-track">
      <div class="accuracy-fill" id="accuracyFill"></div>
    </div>
  </div>

  <!-- Note -->
  <div class="note">
    <kbd class="kbd">A</kbd> Correct &nbsp;·&nbsp;
    <kbd class="kbd">S</kbd> Skip &nbsp;·&nbsp;
    <kbd class="kbd">D</kbd> Wrong<br>
    <kbd class="kbd">Ctrl Z</kbd> Undo &nbsp;·&nbsp;
    <kbd class="kbd">Ctrl Y</kbd> Redo<br>
    Session auto-saved — close &amp; reopen anytime.
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'nmcalc_v3';

let log    = [];
let future = [];
let resetPending = false;
let resetTimer   = null;

function computeStats() {
  let score = 0, correct = 0, wrong = 0, skipped = 0;
  for (const e of log) {
    if      (e.type === 'correct') { score += 1;     correct++; }
    else if (e.type === 'wrong')   { score -= e.neg; wrong++;   }
    else                           {                 skipped++; }
  }
  const attempted = correct + wrong;
  const accuracy  = attempted > 0 ? (correct / attempted) * 100 : null;
  return { score, correct, wrong, skipped, accuracy, qNumber: log.length + 1 };
}

function render() {
  const { score, correct, wrong, skipped, accuracy, qNumber } = computeStats();

  const sd = document.getElementById('scoreDisplay');
  sd.textContent = score.toFixed(2);
  sd.className   = 'score-value' + (score > 0 ? ' pos' : score < 0 ? ' neg' : '');

  document.getElementById('qBadge').textContent      = qNumber;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('statWrong').textContent   = wrong;

  const pctEl  = document.getElementById('accuracyPct');
  const statAc = document.getElementById('statAccuracy');
  const fill   = document.getElementById('accuracyFill');

  if (accuracy !== null) {
    const s = accuracy.toFixed(1) + '%';
    pctEl.textContent  = s;
    statAc.textContent = s;
    fill.style.width   = accuracy + '%';
  } else {
    pctEl.textContent  = '—';
    statAc.textContent = '—';
    fill.style.width   = '0%';
  }

  document.getElementById('btnUndo').disabled = log.length === 0;
  document.getElementById('btnRedo').disabled = future.length === 0;

  save();
}

function getNeg() {
  return parseFloat(document.getElementById('negativeMark').value);
}

function commit(entry) {
  log.push(entry);
  future = [];
  render();
}

function addCorrect(e) { commit({ type: 'correct', neg: getNeg() }); feedback(e, 'correct'); }
function addSkip(e)    { commit({ type: 'skip',    neg: getNeg() }); feedback(e, 'skip');    }
function addWrong(e)   { commit({ type: 'wrong',   neg: getNeg() }); feedback(e, 'wrong');   }

function undo() {
  if (log.length === 0) return;
  future.push(log.pop());
  render();
  beep(420, 'sine', 0.1, 0.22);
  buzz(25);
}

function redo() {
  if (future.length === 0) return;
  log.push(future.pop());
  render();
  beep(520, 'sine', 0.1, 0.22);
  buzz(25);
}

function resetAll() {
  if (log.length === 0 && future.length === 0) return;

  if (!resetPending) {
    resetPending = true;
    const btn = document.getElementById('btnReset');
    btn.classList.add('confirm-reset');
    showToast('Tap reset again to confirm');
    resetTimer = setTimeout(() => {
      resetPending = false;
      btn.classList.remove('confirm-reset');
    }, 2000);
    return;
  }

  clearTimeout(resetTimer);
  resetPending = false;
  document.getElementById('btnReset').classList.remove('confirm-reset');

  log    = [];
  future = [];
  render();
  showToast('Reset — starting from Q1');
  beep(300, 'triangle', 0.18, 0.28);
  buzz([35, 25, 35]);
}

function feedback(e, type) {
  if (e) ripple(e);
  if      (type === 'correct') { beep(860, 'sine',     0.16, 0.42); buzz(38); }
  else if (type === 'wrong')   { beep(210, 'square',   0.2,  0.35); buzz([55, 35, 55]); }
  else                         { beep(520, 'triangle', 0.13, 0.28); buzz(22); }
}

function ripple(e) {
  const btn = e.currentTarget;
  const old = btn.querySelector('.ripple');
  if (old) old.remove();
  const span = document.createElement('span');
  const d    = Math.max(btn.clientWidth, btn.clientHeight);
  const r    = d / 2;
  const rect = btn.getBoundingClientRect();
  span.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-rect.left-r}px;top:${e.clientY-rect.top-r}px;`;
  span.classList.add('ripple');
  btn.appendChild(span);
}

let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function beep(freq, type, dur, vol) {
  try {
    const ctx = getCtx();
    const o   = ctx.createOscillator();
    const g   = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur);
  } catch(_) {}
}
function buzz(p) { if (navigator.vibrate) navigator.vibrate(p); }

let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2600);
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      log, future,
      neg: document.getElementById('negativeMark').value
    }));
  } catch(_) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.log || d.log.length === 0) return false;
    log    = d.log;
    future = d.future || [];
    if (d.neg) document.getElementById('negativeMark').value = d.neg;
    return true;
  } catch(_) { return false; }
}

document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); undo(); return; }
    if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); redo(); return; }
  }
  if      (e.key.toLowerCase() === 'a') addCorrect(null);
  else if (e.key.toLowerCase() === 's') addSkip(null);
  else if (e.key.toLowerCase() === 'd') addWrong(null);
});

(function() {
  const restored = load();
  render();
  if (restored) {
    const { qNumber } = computeStats();
    showToast('Session restored — Q' + (qNumber - 1) + ' done');
  }
})();
</script>
</body>
</html>
